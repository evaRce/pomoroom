# LiveKit config for local development.
#
# Uses host networking so the server advertises its LAN IP for ICE.
# Do NOT enable `use_external_ip`, as it would advertise the public IP
# and break connections from clients in the same network (NAT hairpin issue).
#
# TURN/TLS is not configured here (requires a real domain in production).

port: 7880

keys:
  devkey: secret

rtc:
  tcp_port: 7881
  udp_port: 7882

turn:
  enabled: true
  udp_port: 3478